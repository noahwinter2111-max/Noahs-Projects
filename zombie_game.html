<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zombie Waves</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #wrap { position: relative; user-select: none; }
    canvas { display: block; cursor: crosshair; }

    /* ── OVERLAY ── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.78);
      color: #fff;
    }
    #overlay.hidden { display: none; }

    h1.title {
      font-size: 3rem; font-weight: 900; letter-spacing: 0.06em;
      color: #ff3333; text-shadow: 0 0 30px #ff3333, 0 0 60px rgba(255,50,50,0.4);
      margin-bottom: 6px;
    }
    .tagline { font-size: 0.85rem; color: #666; margin-bottom: 28px; letter-spacing: 0.1em; text-transform: uppercase; }
    .controls-hint { font-size: 0.8rem; color: #555; margin-bottom: 6px; }

    .btn {
      padding: 12px 36px; font-size: 0.95rem; font-weight: 700;
      background: #cc2222; color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-family: inherit; margin: 6px;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #ee3333; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn.ghost { background: #1e1e1e; border: 1px solid #333; }
    .btn.ghost:hover { background: #2a2a2a; }

    /* ── WAVE CLEAR ── */
    .wave-clear-title {
      font-size: 2.8rem; font-weight: 900; color: #ffd700;
      text-shadow: 0 0 20px #ffd700;
      letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .wave-clear-sub { font-size: 1rem; color: #aaa; }

    /* ── UPGRADE SCREEN ── */
    .upg-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; color: #fff; letter-spacing: 0.06em; }
    .upg-sub { font-size: 0.75rem; color: #666; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.1em; }
    #upgrade-choices { display: flex; gap: 14px; }
    .upg-card {
      width: 155px; padding: 18px 12px 16px; text-align: center;
      background: #111; border: 2px solid #2a2a2a; border-radius: 12px;
      cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .upg-card:hover {
      border-color: #cc2222; transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(204,34,34,0.3);
    }
    .upg-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .upg-name { font-size: 0.82rem; font-weight: 700; color: #fff; margin-bottom: 5px; letter-spacing: 0.04em; }
    .upg-desc { font-size: 0.7rem; color: #666; line-height: 1.4; }

    /* ── END SCREENS ── */
    .end-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .end-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; letter-spacing: 0.06em; }
    .end-stat { font-size: 0.9rem; color: #aaa; margin-bottom: 4px; }
    .end-score { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 24px; }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="820" height="580"></canvas>

  <div id="overlay">
    <!-- MENU -->
    <div id="screen-menu">
      <h1 class="title">ZOMBIE WAVES</h1>
      <div class="tagline">Survive 10 waves or die trying</div>
      <div class="controls-hint">WASD &nbsp;·&nbsp; Mouse Aim &nbsp;·&nbsp; Left Click to Shoot</div>
      <div class="controls-hint" style="margin-bottom:28px;">Hold click for automatic fire</div>
      <button class="btn" id="btn-start">START GAME</button>
    </div>

    <!-- WAVE CLEAR -->
    <div id="screen-wave" style="display:none; text-align:center;">
      <div class="wave-clear-title" id="wc-title">WAVE 1 CLEAR</div>
      <div class="wave-clear-sub" id="wc-sub">Preparing next wave...</div>
    </div>

    <!-- UPGRADE -->
    <div id="screen-upgrade" style="display:none; text-align:center;">
      <div class="upg-title">UPGRADE YOUR LOADOUT</div>
      <div class="upg-sub">Choose one enhancement</div>
      <div id="upgrade-choices"></div>
    </div>

    <!-- GAME OVER -->
    <div id="screen-gameover" style="display:none; text-align:center;">
      <div class="end-icon">💀</div>
      <div class="end-title" style="color:#ff3333;">GAME OVER</div>
      <div class="end-stat" id="go-wave-text"></div>
      <div class="end-score" id="go-score-text"></div>
      <button class="btn" id="btn-restart">PLAY AGAIN</button>
    </div>

    <!-- VICTORY -->
    <div id="screen-victory" style="display:none; text-align:center;">
      <div class="end-icon">🏆</div>
      <div class="end-title" style="color:#ffd700; text-shadow:0 0 20px #ffd700;">SURVIVED!</div>
      <div class="end-stat">All 10 waves defeated!</div>
      <div class="end-score" id="vic-score-text"></div>
      <button class="btn" id="btn-restart2">PLAY AGAIN</button>
    </div>
  </div>
</div>

<script>
// ── CANVAS ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── AUDIO ────────────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
function tone(freq, type, dur, vol = 0.12, delay = 0) {
  try {
    const ac = new AC(), o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
    o.start(ac.currentTime + delay); o.stop(ac.currentTime + delay + dur);
  } catch(e) {}
}
const sfx = {
  shoot:    () => tone(900, 'square', 0.04, 0.05),
  hit:      () => tone(220, 'sawtooth', 0.07, 0.04),
  kill:     () => { tone(440, 'sine', 0.07); tone(660, 'sine', 0.07, 0.1, 0.06); },
  hurt:     () => { tone(140, 'sawtooth', 0.18, 0.1); },
  waveDone: () => { [523,659,784].forEach((f,i) => tone(f,'sine',0.15,0.15,i*0.09)); },
  bossWarn: () => { [110,80,55].forEach((f,i) => tone(f,'sawtooth',0.3,0.12,i*0.1)); },
  over:     () => { [440,330,220,110].forEach((f,i) => tone(f,'sawtooth',0.28,0.09,i*0.15)); },
  win:      () => { [523,659,784,1047,1319].forEach((f,i) => tone(f,'sine',0.2,0.15,i*0.1)); },
};

// ── UPGRADES ─────────────────────────────────────────────────────────────────
const UPGRADES = [
  { icon:'⚔️',  name:'Hollow Points',   desc:'+30% bullet damage',          apply: p => { p.damage  *= 1.3; } },
  { icon:'🔫',  name:'Extended Mag',    desc:'+35% fire rate',              apply: p => { p.fireRate*= 1.35; } },
  { icon:'👟',  name:'Adrenaline',      desc:'+22% move speed',             apply: p => { p.speed   *= 1.22; } },
  { icon:'❤️',  name:'Body Armor',      desc:'+60 max HP & full restore',   apply: p => { p.maxHp  += 60; p.hp = p.maxHp; } },
  { icon:'💉',  name:'Medkit',          desc:'Restore 40 HP now',           apply: p => { p.hp = Math.min(p.hp+40, p.maxHp); } },
  { icon:'💨',  name:'Tracer Rounds',   desc:'+45% bullet velocity',        apply: p => { p.bSpeed *= 1.45; } },
  { icon:'🎯',  name:'AP Rounds',       desc:'Bullets pierce 1 extra enemy',apply: p => { p.pierce++; } },
  { icon:'💥',  name:'Shotgun Mod',     desc:'+2 spread bullets per shot',  apply: p => { p.spread += 2; } },
  { icon:'🔮',  name:'Explosive Tips',  desc:'+60% bullet size & +15% dmg', apply: p => { p.bSize *= 1.6; p.damage *= 1.15; } },
  { icon:'🌀',  name:'Overcharge',      desc:'+20% all stats',              apply: p => { p.damage*=1.2; p.fireRate*=1.2; p.speed*=1.2; } },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
// 'menu' | 'playing' | 'between' | 'upgrade' | 'dying' | 'gameover' | 'victory'
let gameState = 'menu';
let wave = 0, score = 0;
let player, zombies, bullets, particles;
let waveConfig, spawned, spawnTimer, waveKilled, bossSpawned;
let betweenTimer = 0;
let keys = {}, mouse = { x: W/2, y: H/2 }, mouseDown = false;

// ── PLAYER FACTORY ────────────────────────────────────────────────────────────
function makePlayer() {
  return {
    x: W/2, y: H/2,
    r: 15, speed: 200,
    hp: 100, maxHp: 100,
    fireRate: 4,   // shots/sec
    damage: 32,
    bSpeed: 480,
    bSize: 5,
    pierce: 1,
    spread: 1,
    lastShot: 0,
    angle: 0,
    iframes: 0,    // invincibility frames (seconds)
  };
}

// ── WAVE CONFIG ───────────────────────────────────────────────────────────────
function waveOf(w) {
  return {
    count:         5 + w * 3,          // normal zombies
    speed:         52 + w * 7,
    hp:            28 + w * 20,
    spawnInterval: Math.max(0.22, 1.5 - w * 0.11),
    bossHp:        600 + w * 120,
    bossSpeed:     50 + w * 2,
  };
}

// ── SPAWN HELPERS ─────────────────────────────────────────────────────────────
function edgePos(r) {
  const side = (Math.random() * 4) | 0;
  if (side === 0) return { x: Math.random() * W, y: -r };
  if (side === 1) return { x: W + r,             y: Math.random() * H };
  if (side === 2) return { x: Math.random() * W, y: H + r };
  return              { x: -r,                  y: Math.random() * H };
}

function makeZombie(cfg, isBoss = false) {
  const r    = isBoss ? 34 : 11 + Math.random() * 5;
  const pos  = edgePos(r);
  const hp   = isBoss ? cfg.bossHp : cfg.hp * (0.85 + Math.random() * 0.3);
  const spd  = isBoss ? cfg.bossSpeed : cfg.speed * (0.85 + Math.random() * 0.3);
  return {
    x: pos.x, y: pos.y, r,
    speed: spd, hp, maxHp: hp,
    isBoss,
    color: isBoss ? '#cc1100' : `hsl(${115 + Math.random()*25}, 65%, ${40 + Math.random()*10}%)`,
    wobble: Math.random() * Math.PI * 2,
    flash: 0,
  };
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function burst(x, y, color, n = 8, spd = 120) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.6;
    const v = spd * (0.4 + Math.random() * 0.8);
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     r: 3 + Math.random()*4, color, life: 1,
                     decay: 1.2 + Math.random() * 0.8 });
  }
}

// ── GAME INIT / WAVE START ────────────────────────────────────────────────────
function init() {
  player    = makePlayer();
  zombies   = []; bullets = []; particles = [];
  wave      = 0; score = 0;
  startNextWave();
}

function startNextWave() {
  wave++;
  waveConfig    = waveOf(wave);
  spawned       = 0;
  waveKilled    = 0;
  spawnTimer    = 0.5;  // small delay before first spawn
  bossSpawned   = false;
  gameState     = 'playing';
  hideAllScreens();
  if (wave === 10) setTimeout(() => sfx.bossWarn(), 300);
}

// ── SCREEN MANAGEMENT ─────────────────────────────────────────────────────────
function hideAllScreens() {
  ['menu','wave','upgrade','gameover','victory'].forEach(id =>
    document.getElementById(`screen-${id}`).style.display = 'none'
  );
  document.getElementById('overlay').classList.add('hidden');
}

function showScreen(id) {
  hideAllScreens();
  document.getElementById(`screen-${id}`).style.display = 'block';
  document.getElementById('overlay').classList.remove('hidden');
}

function triggerBetween() {
  gameState = 'between';
  betweenTimer = wave < 10 ? 1.8 : 2.2;
  const wc = document.getElementById('wc-title');
  const ws = document.getElementById('wc-sub');
  wc.textContent = wave < 10 ? `WAVE ${wave} CLEAR` : 'FINAL WAVE CLEAR!';
  ws.textContent = wave < 10 ? 'Prepare for next wave...' : 'You survived them all!';
  wc.style.color = wave === 10 ? '#ffd700' : '#ffd700';
  showScreen('wave');
  sfx.waveDone();
}

function triggerUpgrade() {
  gameState = 'upgrade';
  const pool = [...UPGRADES].sort(() => Math.random() - 0.5).slice(0, 3);
  const c    = document.getElementById('upgrade-choices');
  c.innerHTML = '';
  pool.forEach(upg => {
    const card = document.createElement('div');
    card.className = 'upg-card';
    card.innerHTML = `<div class="upg-icon">${upg.icon}</div>
                      <div class="upg-name">${upg.name}</div>
                      <div class="upg-desc">${upg.desc}</div>`;
    card.addEventListener('click', () => { upg.apply(player); startNextWave(); });
    c.appendChild(card);
  });
  showScreen('upgrade');
}

function triggerGameOver() {
  gameState = 'gameover';
  document.getElementById('go-wave-text').textContent  =
    `Survived ${wave - 1} wave${wave - 1 !== 1 ? 's' : ''}`;
  document.getElementById('go-score-text').textContent =
    `Score: ${score.toLocaleString()}`;
  showScreen('gameover');
  sfx.over();
}

function triggerVictory() {
  gameState = 'victory';
  document.getElementById('vic-score-text').textContent =
    `Final Score: ${score.toLocaleString()}`;
  showScreen('victory');
  sfx.win();
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  // Between-wave countdown
  if (gameState === 'between') {
    betweenTimer -= dt;
    if (betweenTimer <= 0) {
      if (wave >= 10) triggerVictory();
      else            triggerUpgrade();
    }
    // Let particles continue
    tickParticles(dt);
    return;
  }

  if (gameState !== 'playing' && gameState !== 'dying') return;

  // ── Player movement ──────────────────────────────────────────────────────
  if (gameState === 'playing') {
    let mx = 0, my = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    my -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  my += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  mx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
    if (mx && my) { mx *= 0.707; my *= 0.707; }
    player.x = clamp(player.x + mx * player.speed * dt, player.r, W - player.r);
    player.y = clamp(player.y + my * player.speed * dt, player.r, H - player.r);
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    if (player.iframes > 0) player.iframes -= dt;

    // ── Shooting ────────────────────────────────────────────────────────────
    if (mouseDown) {
      const now = performance.now() / 1000;
      if (now - player.lastShot >= 1 / player.fireRate) {
        player.lastShot = now;
        sfx.shoot();
        for (let s = 0; s < player.spread; s++) {
          const offset = (s - (player.spread - 1) / 2) * 0.2;
          const a = player.angle + offset;
          bullets.push({
            x: player.x + Math.cos(player.angle) * (player.r + 6),
            y: player.y + Math.sin(player.angle) * (player.r + 6),
            vx: Math.cos(a) * player.bSpeed,
            vy: Math.sin(a) * player.bSpeed,
            r: player.bSize,
            dmg: player.damage,
            pierce: player.pierce,
            hits: 0,
          });
        }
      }
    }
  }

  // ── Spawn zombies ────────────────────────────────────────────────────────
  spawnTimer -= dt;
  if (spawnTimer <= 0 && spawned < waveConfig.count) {
    spawnTimer = waveConfig.spawnInterval;
    zombies.push(makeZombie(waveConfig));
    spawned++;
  }

  // ── Boss spawn on wave 10 ────────────────────────────────────────────────
  if (wave === 10 && !bossSpawned && spawned >= waveConfig.count && zombies.length === 0) {
    bossSpawned = true;
    zombies.push(makeZombie(waveConfig, true));
    sfx.bossWarn();
  }

  // ── Move zombies & check player contact ─────────────────────────────────
  zombies.forEach(z => {
    z.wobble += dt * (z.isBoss ? 2 : 3.5);
    z.flash   = Math.max(0, z.flash - dt);
    const dx = player.x - z.x, dy = player.y - z.y;
    const dist = Math.hypot(dx, dy) || 0.001;
    z.x += (dx / dist) * z.speed * dt;
    z.y += (dy / dist) * z.speed * dt;

    if (gameState === 'playing' && player.iframes <= 0 && dist < player.r + z.r + 2) {
      const dmg = z.isBoss ? 28 : 14;
      player.hp    -= dmg;
      player.iframes = 0.65;
      sfx.hurt();
      burst(player.x, player.y, '#4488ff', 6, 70);
      if (player.hp <= 0) {
        player.hp  = 0;
        gameState  = 'dying';
        burst(player.x, player.y, '#4488ff', 22, 160);
        setTimeout(triggerGameOver, 700);
      }
    }
  });

  // ── Move bullets & collisions ────────────────────────────────────────────
  bullets.forEach(b => {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.hits >= b.pierce) return;
    for (let i = zombies.length - 1; i >= 0; i--) {
      if (b.hits >= b.pierce) break;
      const z = zombies[i];
      if (Math.hypot(z.x - b.x, z.y - b.y) < z.r + b.r) {
        b.hits++;
        z.hp   -= b.dmg;
        z.flash = 0.12;
        sfx.hit();
        burst(b.x, b.y, z.isBoss ? '#ff6644' : '#88ff55', z.isBoss ? 6 : 4, 60);
        if (z.hp <= 0) {
          score += z.isBoss ? 1000 : 100 + (wave - 1) * 15;
          waveKilled++;
          burst(z.x, z.y, z.color, z.isBoss ? 24 : 10, z.isBoss ? 170 : 130);
          sfx.kill();
          zombies.splice(i, 1);
        }
      }
    }
  });

  // ── Cull bullets ────────────────────────────────────────────────────────
  bullets = bullets.filter(b =>
    b.hits < b.pierce &&
    b.x > -30 && b.x < W + 30 && b.y > -30 && b.y < H + 30
  );

  tickParticles(dt);

  // ── Check wave complete ──────────────────────────────────────────────────
  if (gameState === 'playing') {
    const normalsDone  = spawned >= waveConfig.count;
    const bossRequired = wave === 10;
    const waveComplete =
      bossRequired
        ? bossSpawned && zombies.length === 0
        : normalsDone && zombies.length === 0;

    if (waveComplete) triggerBetween();
  }
}

function tickParticles(dt) {
  particles.forEach(p => {
    p.x  += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.91;      p.vy *= 0.91;
    p.life -= p.decay * dt;
  });
  particles = particles.filter(p => p.life > 0);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  if (gameState === 'menu') return;

  particles.forEach(drawParticle);
  bullets.forEach(drawBullet);
  zombies.forEach(drawZombie);
  if (gameState !== 'gameover') drawPlayer();
  if (['playing','between','dying'].includes(gameState)) drawHUD();
}

function drawBg() {
  ctx.fillStyle = '#0d160d';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 44) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 44) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  // Vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function drawZombie(z) {
  ctx.save();
  ctx.translate(z.x, z.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(2, z.r * 0.6, z.r * 0.75, z.r * 0.3, 0, 0, Math.PI*2); ctx.fill();

  // Body glow (boss only)
  if (z.isBoss) {
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 20;
  }

  // Body
  const flashT = z.flash / 0.12;
  ctx.fillStyle = flashT > 0
    ? `rgba(255,255,255,${flashT * 0.85})`
    : z.color;
  ctx.beginPath(); ctx.arc(0, 0, z.r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  if (!z.isBoss) {
    // Eyes
    ctx.fillStyle = '#ff2200';
    ctx.beginPath(); ctx.arc(-z.r*0.3, -z.r*0.2, z.r*0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( z.r*0.3, -z.r*0.2, z.r*0.2, 0, Math.PI*2); ctx.fill();
    // Mouth
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-z.r*0.35, z.r*0.25);
    ctx.lineTo(-z.r*0.15, z.r*0.38);
    ctx.lineTo(0,          z.r*0.3);
    ctx.lineTo( z.r*0.15, z.r*0.38);
    ctx.lineTo( z.r*0.35, z.r*0.25);
    ctx.stroke();
  } else {
    // Boss face
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.arc(-z.r*0.3, -z.r*0.22, z.r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( z.r*0.3, -z.r*0.22, z.r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-z.r*0.3, -z.r*0.22, z.r*0.09, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( z.r*0.3, -z.r*0.22, z.r*0.09, 0, Math.PI*2); ctx.fill();
    // Brow
    ctx.strokeStyle = '#880000'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-z.r*0.55, -z.r*0.45); ctx.lineTo(-z.r*0.15, -z.r*0.32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( z.r*0.55, -z.r*0.45); ctx.lineTo( z.r*0.15, -z.r*0.32); ctx.stroke();
    // BOSS label
    ctx.fillStyle = '#ff4444'; ctx.font = `700 ${z.r * 0.35}px monospace`;
    ctx.textAlign = 'center'; ctx.fillText('BOSS', 0, z.r + 14);
  }

  ctx.restore();

  // HP bar
  const bw = z.r * 2.4, bh = z.isBoss ? 7 : 5;
  const bx = z.x - bw / 2, by = z.y - z.r - (z.isBoss ? 16 : 12);
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, bw, bh);
  const frac  = Math.max(0, z.hp / z.maxHp);
  ctx.fillStyle = frac > 0.5 ? '#22cc44' : frac > 0.25 ? '#ffaa00' : '#ff2222';
  ctx.fillRect(bx, by, bw * frac, bh);
}

function drawPlayer() {
  const p = player;
  // Iframes blink
  if (p.iframes > 0 && Math.floor(p.iframes * 12) % 2 === 0) return;

  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(2, p.r * 0.55, p.r*0.75, p.r*0.3, 0, 0, Math.PI*2); ctx.fill();

  // Glow ring
  ctx.shadowColor = '#3a8eff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(80,160,255,0.5)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Body
  ctx.fillStyle = '#2a70e8';
  ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();

  // Gun dot
  const gx = Math.cos(p.angle) * (p.r + 7);
  const gy = Math.sin(p.angle) * (p.r + 7);
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(gx, gy, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#fff5aa';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  ctx.globalAlpha = Math.max(0, p.life * 0.9);
  ctx.fillStyle   = p.color;
  ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const p = player;

  // ── HP bar ────────────────────────────────────────────────────────────────
  const hpW = 190, hpH = 15, hpX = 12, hpY = H - 36;
  ctx.fillStyle = '#111';
  rrect(hpX, hpY, hpW, hpH, 4);
  ctx.fill();
  const hpFrac = p.hp / p.maxHp;
  ctx.fillStyle = hpFrac > 0.5 ? '#22cc44' : hpFrac > 0.25 ? '#ffaa00' : '#ff3333';
  rrect(hpX, hpY, hpW * hpFrac, hpH, 4);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '700 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${p.hp} / ${p.maxHp} HP`, hpX + hpW / 2, hpY + hpH - 2);

  // ── Wave + zombies remaining ──────────────────────────────────────────────
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font      = '800 16px monospace';
  ctx.fillText(`WAVE  ${wave} / 10`, W / 2, 26);

  const remaining = wave === 10 && bossSpawned
    ? zombies.length
    : Math.max(0, (waveConfig.count - waveKilled) + (wave === 10 && !bossSpawned ? 1 : 0));
  ctx.fillStyle = '#888';
  ctx.font      = '600 12px monospace';
  ctx.fillText(
    wave === 10 && bossSpawned && zombies.length > 0
      ? '☠ BOSS ALIVE'
      : `${remaining} zombie${remaining !== 1 ? 's' : ''} remaining`,
    W / 2, 44
  );

  // ── Wave progress bar ─────────────────────────────────────────────────────
  const pw = W - 24;
  ctx.fillStyle = '#1a1a1a';
  rrect(12, H - 10, pw, 5, 3); ctx.fill();
  const totalKills = wave === 10 ? waveConfig.count + 1 : waveConfig.count;
  const prog = Math.min(1, waveKilled / totalKills);
  if (prog > 0) {
    ctx.fillStyle = '#3a8eff';
    rrect(12, H - 10, pw * prog, 5, 3); ctx.fill();
  }

  // ── Score ─────────────────────────────────────────────────────────────────
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd700';
  ctx.font      = '800 16px monospace';
  ctx.fillText(score.toLocaleString(), W - 12, 26);
  ctx.fillStyle = '#555';
  ctx.font      = '600 10px monospace';
  ctx.fillText('SCORE', W - 12, 40);

  // ── Upgrade indicators (small icons top-left) ─────────────────────────────
  ctx.textAlign = 'left';
  ctx.fillStyle = '#444';
  ctx.font      = '600 10px monospace';
  const tags = [];
  if (p.pierce > 1)  tags.push(`Pierce ×${p.pierce}`);
  if (p.spread > 1)  tags.push(`Spread ×${p.spread}`);
  tags.forEach((t, i) => ctx.fillText(t, 12, 20 + i * 14));
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);   ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);   ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);       ctx.quadraticCurveTo(x,     y,     x + r, y);
  ctx.closePath();
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
let lastTS = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top)  * (H / rect.height);
});
canvas.addEventListener('mousedown',    e => { if (e.button === 0) mouseDown = true; });
canvas.addEventListener('mouseup',      e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('contextmenu',  e => e.preventDefault());

// ── BUTTON WIRING ─────────────────────────────────────────────────────────────
document.getElementById('btn-start')   .addEventListener('click', init);
document.getElementById('btn-restart') .addEventListener('click', init);
document.getElementById('btn-restart2').addEventListener('click', init);

// ── BOOT ──────────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
</body>
</html>
